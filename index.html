<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance AI - Personal Cloud Edition</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <!-- 구글 API 라이브러리 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-family: "Pretendard", sans-serif; margin: 0; }
        .sleek-card { background: white; border: 1px solid #E2E8F0; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .sync-spin { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'sidebar-bg': '#0F172A', 'accent-blue': '#2563EB' } } }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Wallet, ShieldCheck, Edit3, Table, LayoutDashboard, 
            LogOut, RefreshCw, CheckCircle, AlertCircle, User, Gavel, Save, Trash2,
            TrendingUp, TrendingDown, Calendar
        } = LucideReact;

        // --- 대표님 설정 정보 ---
        const CLIENT_ID = "810220677734-1va5j5p719qrithbcd4bo1475qqc16ii.apps.googleusercontent.com";
        const SCOPES = "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file";

        function App() {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [syncStatus, setSyncStatus] = useState('idle');
            const [accessToken, setAccessToken] = useState(null);
            const [spreadsheetId, setSpreadsheetId] = useState(null);

            // 1. 구글 API 초기화
            useEffect(() => {
                const initClient = () => {
                    window.gapi.load('client', async () => {
                        await gapi.client.init({
                            discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
                        });
                    });
                };
                
                const script = document.createElement('script');
                script.src = "https://apis.google.com/js/api.js";
                script.onload = initClient;
                document.head.appendChild(script);
            }, []);

            // 2. 로그인 및 권한 획득
            const handleLogin = () => {
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: async (response) => {
                        if (response.error) return;
                        setAccessToken(response.access_token);
                        
                        // 사용자 정보 가져오기
                        const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                            headers: { Authorization: `Bearer ${response.access_token}` }
                        }).then(res => res.json());
                        
                        setUser({
                            name: userInfo.name,
                            email: userInfo.email,
                            picture: userInfo.picture
                        });

                        // 드라이브에서 시트 찾기 또는 생성
                        await initializeSpreadsheet(response.access_token);
                    },
                });
                tokenClient.requestAccessToken();
            };

            // 3. 시트 찾기 또는 생성 로직
            const initializeSpreadsheet = async (token) => {
                setSyncStatus('syncing');
                try {
                    // 1. 'Finance_AI_Data' 파일 검색
                    const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='Finance_AI_Data' and mimeType='application/vnd.google-apps.spreadsheet'`, {
                        headers: { Authorization: `Bearer ${token}` }
                    }).then(res => res.json());

                    let sheetId;
                    if (searchRes.files && searchRes.files.length > 0) {
                        sheetId = searchRes.files[0].id;
                    } else {
                        // 2. 없으면 새로 생성
                        const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                            method: 'POST',
                            headers: { 
                                Authorization: `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: 'Finance_AI_Data',
                                mimeType: 'application/vnd.google-apps.spreadsheet'
                            })
                        }).then(res => res.json());
                        sheetId = createRes.id;
                        
                        // 헤더 추가
                        await updateSheetData(sheetId, [['id', 'category', 'source', 'amount', 'executionDate', 'createdAt']], token);
                    }
                    
                    setSpreadsheetId(sheetId);
                    await loadData(sheetId, token);
                } catch (err) {
                    setSyncStatus('error');
                }
            };

            const loadData = async (id, token) => {
                try {
                    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Sheet1!A:F`, {
                        headers: { Authorization: `Bearer ${token}` }
                    }).then(res => res.json());
                    
                    if (res.values && res.values.length > 1) {
                        const headers = res.values[0];
                        const rows = res.values.slice(1).map(row => {
                            const obj = {};
                            headers.forEach((h, i) => obj[h] = row[i]);
                            return obj;
                        });
                        setRecords(rows);
                    }
                    setSyncStatus('success');
                } catch (e) { setSyncStatus('error'); }
            };

            const updateSheetData = async (id, values, token) => {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Sheet1!A1?valueInputOption=RAW`, {
                    method: 'PUT',
                    headers: { 
                        Authorization: `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ values })
                });
            };

            const syncWithCloud = async (updatedRecords) => {
                if (!spreadsheetId || !accessToken) return;
                setSyncStatus('syncing');
                try {
                    const headers = ['id', 'category', 'source', 'amount', 'executionDate', 'createdAt'];
                    const values = [headers, ...updatedRecords.map(r => headers.map(h => r[h]))];
                    await updateSheetData(spreadsheetId, values, accessToken);
                    setSyncStatus('success');
                } catch (e) { setSyncStatus('error'); }
            };

            const addRecord = (newRecord) => {
                const updated = [{ id: Date.now().toString(), ...newRecord, createdAt: new Date().toISOString() }, ...records];
                setRecords(updated);
                syncWithCloud(updated);
            };

            const totalAssets = records.filter(r => r.category === 'ASSET').reduce((sum, r) => sum + Number(r.amount), 0);
            const totalLiabilities = records.filter(r => r.category === 'LIABILITY').reduce((sum, r) => sum + Number(r.amount), 0);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                        <div className="max-w-md w-full sleek-card p-12 text-center">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-white shadow-xl">
                                <Wallet size={40} />
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 mb-3">Finance AI</h1>
                            <p className="text-slate-500 mb-12 text-sm leading-relaxed font-bold">기업 재무 리포트</p>
                            <button 
                                onClick={handleLogin}
                                className="w-full bg-white border border-slate-200 py-4 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 transition-all shadow-sm"
                            >
                                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" className="w-6 h-6" />
                                Google 계정으로 시작하기
                            </button>
                            <p className="mt-6 text-[10px] text-slate-400 uppercase tracking-widest font-bold">Data stays in your Google Drive</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen">
                    <aside className="w-72 bg-[#0F172A] text-white flex flex-col p-8 shrink-0">
                        <div className="flex items-center gap-3 mb-12 pb-8 border-b border-white/10">
                            <Wallet size={24} className="text-blue-500" />
                            <h1 className="text-xl font-black">FINANCE AI</h1>
                        </div>
                        <nav className="flex-1 space-y-3">
                            {['dashboard', 'manual', 'records'].map(id => (
                                <button key={id} onClick={() => setActiveTab(id)} className={`flex items-center gap-4 w-full px-5 py-4 rounded-2xl text-sm font-bold transition-all ${activeTab === id ? "bg-blue-600 text-white shadow-lg" : "text-slate-400 hover:text-white hover:bg-white/5"}`}>
                                    {id === 'dashboard' ? <LayoutDashboard size={20}/> : id === 'manual' ? <Edit3 size={20}/> : <Table size={20}/>}
                                    {id === 'dashboard' ? "대시보드" : id === 'manual' ? "내역 기록" : "통합 장부"}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto pt-6 border-t border-white/10 flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase">
                            <div className="flex items-center gap-2">
                                {syncStatus === 'syncing' ? <RefreshCw size={12} className="sync-spin" /> : <CheckCircle size={12} className="text-emerald-500" />}
                                <span>{syncStatus === 'syncing' ? "Syncing..." : "Drive Connected"}</span>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col">
                        <header className="h-24 bg-white border-b border-slate-200 px-12 flex items-center justify-between">
                            <div className="flex items-center gap-2 text-slate-400 font-bold text-xs uppercase tracking-widest">
                                <ShieldCheck size={18} className="text-blue-600" /> CEO Secure Mode
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-sm font-black">{user.name} 대표님</p>
                                    <p className="text-[10px] text-slate-400">{user.email}</p>
                                </div>
                                <img src={user.picture} className="w-12 h-12 rounded-2xl border-2 border-slate-100" />
                                <button onClick={() => location.reload()} className="p-2 text-slate-300 hover:text-red-500"><LogOut size={20}/></button>
                            </div>
                        </header>

                        <div className="p-12 flex-1 overflow-y-auto">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-10">
                                    <div className="grid grid-cols-3 gap-8">
                                        <div className="sleek-card p-8 bg-slate-900 text-white">
                                            <p className="text-[11px] font-bold text-slate-500 uppercase mb-2">Total Assets</p>
                                            <p className="text-4xl font-black">{totalAssets.toLocaleString()} <span className="text-sm font-normal opacity-50">KRW</span></p>
                                        </div>
                                        <div className="sleek-card p-8 border-l-8 border-blue-600">
                                            <p className="text-[11px] font-bold text-slate-400 uppercase mb-2">Total Liabilities</p>
                                            <p className="text-4xl font-black text-slate-900">{totalLiabilities.toLocaleString()} <span className="text-sm font-normal opacity-50">KRW</span></p>
                                        </div>
                                        <div className="sleek-card p-8 bg-emerald-50">
                                            <p className="text-[11px] font-bold text-emerald-600/60 uppercase mb-2">Net Worth</p>
                                            <p className="text-4xl font-black text-emerald-600">{(totalAssets - totalLiabilities).toLocaleString()} <span className="text-sm font-normal opacity-50">KRW</span></p>
                                        </div>
                                    </div>
                                    <div className="sleek-card p-10">
                                        <h3 className="font-bold mb-6 flex items-center gap-2"><Calendar size={20} className="text-blue-600"/> 최근 재무 활동</h3>
                                        <div className="space-y-4">
                                            {records.slice(0, 5).map(r => (
                                                <div key={r.id} className="flex items-center justify-between p-5 bg-slate-50 rounded-2xl">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${r.category === 'ASSET' ? "bg-blue-600 text-white" : "bg-slate-800 text-white"}`}>
                                                            {r.category === 'ASSET' ? <TrendingUp size={18}/> : <TrendingDown size={18}/>}
                                                        </div>
                                                        <div><p className="font-bold">{r.source}</p><p className="text-xs text-slate-400">{r.executionDate}</p></div>
                                                    </div>
                                                    <p className="font-mono font-bold">{Number(r.amount).toLocaleString()} KRW</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'manual' && (
                                <div className="max-w-2xl mx-auto sleek-card p-12">
                                    <h2 className="text-2xl font-black mb-8">신규 내역 기록</h2>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        addRecord({ category: fd.get('category'), source: fd.get('source'), amount: fd.get('amount'), executionDate: fd.get('date') });
                                        e.target.reset();
                                        alert('구글 드라이브에 저장되었습니다.');
                                        setActiveTab('dashboard');
                                    }} className="space-y-6">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">카테고리</label>
                                            <select name="category" className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                                <option value="ASSET">자산 (Asset)</option>
                                                <option value="LIABILITY">부채 (Liability)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">항목명</label>
                                            <input name="source" type="text" className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none focus:ring-2 focus:ring-blue-500" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">금액 (KRW)</label>
                                            <input name="amount" type="number" className="w-full bg-slate-50 rounded-xl p-4 font-mono font-bold outline-none focus:ring-2 focus:ring-blue-500" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase mb-2">날짜</label>
                                            <input name="date" type="date" className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none focus:ring-2 focus:ring-blue-500" defaultValue={new Date().toISOString().split('T')[0]} />
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-blue-200">데이터 저장</button>
                                    </form>
                                </div>
                            )}

                            {activeTab === 'records' && (
                                <div className="sleek-card overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 border-b">
                                            <tr>
                                                <th className="p-6 text-xs font-bold text-slate-400 uppercase">분류</th>
                                                <th className="p-6 text-xs font-bold text-slate-400 uppercase">항목명 / 날짜</th>
                                                <th className="p-6 text-xs font-bold text-slate-400 uppercase text-right">금액</th>
                                                <th className="p-6"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {records.map(r => (
                                                <tr key={r.id} className="hover:bg-slate-50">
                                                    <td className="p-6"><span className={`px-3 py-1 rounded-full text-[10px] font-black ${r.category === 'ASSET' ? "bg-blue-50 text-blue-600" : "bg-slate-900 text-white"}`}>{r.category}</span></td>
                                                    <td className="p-6"><p className="font-bold">{r.source}</p><p className="text-xs text-slate-400">{r.executionDate}</p></td>
                                                    <td className="p-6 font-mono font-bold text-right">{Number(r.amount).toLocaleString()} KRW</td>
                                                    <td className="p-6 text-right"><button onClick={() => { if(confirm('삭제하시겠습니까?')) { const up = records.filter(x => x.id !== r.id); setRecords(up); syncWithCloud(up); } }} className="text-slate-300 hover:text-red-500"><Trash2 size={18}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
